<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JM Motos — Motos seminovas em Sergipe</title>
<meta name="description" content="JM Motos: motos seminovas revisadas, documentação em dia e garantia. Atendimento em todo o Submédio São Francisco e Sergipe.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:#0a0a0a;
    color:#f3f1ec;
    font-family:'Barlow', sans-serif;
    font-size:16px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Oswald', sans-serif;
    text-transform:uppercase;
    letter-spacing:0.01em;
    margin:0;
  }
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;}
  .wrap{max-width:1240px;margin:0 auto;padding:0 24px;}

  /* ---------- signature: parking-line motif ---------- */
  .lane{
    height:14px;
    background: repeating-linear-gradient(
      -45deg,
      #f2c230 0 26px,
      transparent 26px 52px
    );
    opacity:0.9;
  }
  .lane.thin{height:6px; opacity:0.55;}
  .lane-frame{border-top:1px solid rgba(255,255,255,0.08); border-bottom:1px solid rgba(255,255,255,0.08);}

  /* ---------- header ---------- */
  header{
    position:sticky; top:0; z-index:50;
    background:rgba(10,10,10,0.92);
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px; max-width:1240px; margin:0 auto;
  }
  .logo{
    display:flex; align-items:center; gap:10px;
  }
  .logo img{height:44px; width:auto; display:block;}
  .navlinks{display:flex; gap:32px; font-size:0.85rem; letter-spacing:0.06em; text-transform:uppercase; font-weight:600;}
  .navlinks a{opacity:0.75; transition:opacity .2s;}
  .navlinks a:hover{opacity:1; color:#e3151a;}
  .btn{
    display:inline-flex; align-items:center; gap:10px;
    background:#e3151a; color:#fff; font-weight:700;
    padding:12px 22px; border-radius:2px; font-size:0.85rem;
    letter-spacing:0.05em; text-transform:uppercase;
    border:1px solid #e3151a; transition:transform .15s, background .2s;
  }
  .btn:hover{background:#a30f13; transform:translateY(-1px);}
  .btn.ghost{background:transparent; color:#f3f1ec; border-color:rgba(255,255,255,0.08);}
  .btn.ghost:hover{border-color:#e3151a; color:#e3151a;}
  .btn svg{width:18px;height:18px;flex-shrink:0;}
  @media (max-width:860px){ .navlinks{display:none;} }

  /* ---------- hero ---------- */
  .hero{
    position:relative; overflow:hidden;
    display:grid; grid-template-columns: 1.1fr 0.9fr; align-items:stretch;
    min-height:88vh;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .hero-copy{
    display:flex; flex-direction:column; justify-content:center;
    padding:80px 56px; position:relative; z-index:2;
    background:
      linear-gradient(120deg, rgba(10,10,10,1) 55%, rgba(10,10,10,0.2) 100%);
  }
  .eyebrow{
    color:#e3151a; font-weight:700; font-size:0.8rem; letter-spacing:0.25em;
    text-transform:uppercase; margin-bottom:20px; display:flex; align-items:center; gap:12px;
  }
  .eyebrow::before{content:''; width:34px; height:2px; background:#e3151a;}
  .hero h1{
    font-size:2.4rem;
    line-height:0.98; color:#f3f1ec; font-weight:700;
  }
  .hero h1 em{font-style:normal; color:#e3151a;}
  .hero p.lead{
    margin-top:26px; max-width:480px; font-size:1.1rem; color:#c9cdd3;
    font-family:'Barlow'; font-style:italic; font-weight:500;
  }
  .hero-cta{display:flex; gap:16px; margin-top:40px; flex-wrap:wrap;}
  .hero-badges{
    display:flex; gap:28px; margin-top:56px; padding-top:28px;
    border-top:1px solid rgba(255,255,255,0.08); flex-wrap:wrap;
  }
  .hero-badges .badge{font-size:0.78rem; text-transform:uppercase; letter-spacing:0.05em; color:#c9cdd3; font-weight:600; display:flex; align-items:center; gap:8px;}
  .hero-badges .badge svg{width:16px;height:16px; color:#e3151a;}

  .hero-visual::before{
    content:''; position:absolute; top:0; left:0; right:0; bottom:0;
    background: linear-gradient(100deg, #0a0a0a 0%, transparent 30%);
  }
  @media (max-width:960px){
    .hero{grid-template-columns:1fr; min-height:auto;}
    .hero-copy{padding:56px 24px 40px;}
    .hero-visual{min-height:340px;}
  }

  /* ---------- section shell ---------- */
  section{padding:96px 0;}
  .sec-head{max-width:640px; margin-bottom:56px;}
  .sec-head .eyebrow{margin-bottom:14px;}
  .sec-head h2{font-size:1.9rem; color:#f3f1ec;}
  .sec-head p{color:#c9cdd3; margin-top:16px; font-size:1.05rem;}

  /* ---------- stat strip ---------- */
  .stats{
    background:#151515; border-top:1px solid rgba(255,255,255,0.08); border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .stats .wrap{
    display:grid; grid-template-columns:repeat(3,1fr); gap:32px; padding:44px 24px;
  }
  .stat{display:flex; gap:16px; align-items:flex-start;}
  .stat svg{width:30px;height:30px;color:#e3151a; flex-shrink:0; margin-top:4px;}
  .stat h3{font-family:'Oswald'; font-size:1.05rem; color:#f3f1ec; font-weight:600;}
  .stat p{margin:6px 0 0; color:#c9cdd3; font-size:0.92rem;}
  @media (max-width:760px){ .stats .wrap{grid-template-columns:1fr;} }

  /* ---------- catalog ---------- */
  .cat-tag{
    display:inline-block; font-size:0.68rem; letter-spacing:0.12em; font-weight:700;
    text-transform:uppercase; padding:5px 10px; border:1px solid #e3151a; color:#e3151a;
    border-radius:2px;
  }
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:28px;
  }
  .card{
    background:#151515; border:1px solid rgba(255,255,255,0.08); border-radius:4px;
    overflow:hidden; position:relative; transition:transform .25s, border-color .25s;
  }
  .card:hover{transform:translateY(-6px); border-color:#e3151a;}
  .card-media{position:relative; height:220px; overflow:hidden; background:#000;}
  .card-media img{width:100%; height:100%; object-fit:cover; transition:transform .5s;}
  .card:hover .card-media img{transform:scale(1.06);}
  .card-media .strip{position:absolute; left:0; bottom:0; width:100%;}
  .card-body{padding:20px;}
  .card-body .cat-tag{margin-bottom:12px;}
  .card-body h3{font-size:1.25rem; color:#f3f1ec; font-weight:600;}
  .card-body p{color:#c9cdd3; font-size:0.88rem; margin:8px 0 18px;}
  .card-body .cta-row{display:flex; align-items:center; justify-content:space-between;}
  .mini-link{
    display:inline-flex; align-items:center; gap:8px; font-weight:700; font-size:0.82rem;
    text-transform:uppercase; letter-spacing:0.05em; color:#e3151a;
  }
  .mini-link svg{width:16px;height:16px;}

  .catalog-foot{
    text-align:center; margin-top:52px; color:#c9cdd3; font-size:0.95rem;
  }
  .catalog-foot a{color:#e3151a; font-weight:700;}

  /* ---------- diferenciais ---------- */
  .diff-wrap{
    display:grid; grid-template-columns:0.9fr 1.1fr; gap:64px; align-items:center;
  }
  .diff-list{display:flex; flex-direction:column; gap:0;}
  .diff-item{
    display:flex; gap:20px; padding:26px 0; border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .diff-item:first-child{padding-top:0;}
  .diff-num{
    font-family:'Oswald'; font-weight:700; font-size:1.6rem; color:#a30f13; min-width:44px;
  }
  .diff-item h3{font-size:1.15rem; color:#f3f1ec; font-weight:600; margin-bottom:6px;}
  .diff-item p{color:#c9cdd3; font-size:0.92rem; margin:0;}

  .diff-photo::after{
    content:''; position:absolute; top:0; left:0; right:0; bottom:0;
    background:linear-gradient(0deg, rgba(10,10,10,0.85), transparent 55%);
  }
  .diff-photo-tag{
    position:absolute; left:20px; bottom:20px; z-index:2;
    color:#fff; font-family:'Oswald'; text-transform:uppercase; letter-spacing:0.05em;
  }
  .diff-photo-tag span{display:block; font-size:0.7rem; color:#f2c230; letter-spacing:0.2em; margin-bottom:6px;}
  @media (max-width:900px){ .diff-wrap{grid-template-columns:1fr;} .diff-photo{order:-1; min-height:220px;} }

  /* ---------- CTA banner ---------- */
  .cta-banner{
    position:relative; background:#1e1e1e; border-top:1px solid rgba(255,255,255,0.08); border-bottom:1px solid rgba(255,255,255,0.08);
    text-align:center; overflow:hidden;
  }
  .cta-banner::before{
    content:''; position:absolute; top:-2px; left:-2px; right:-2px; bottom:-2px;
    background: repeating-linear-gradient(-45deg, rgba(227,21,26,0.08) 0 40px, transparent 40px 80px);
  }
  .cta-inner{position:relative; z-index:2; padding:80px 24px;}
  .cta-inner h2{font-size:2rem; color:#f3f1ec; margin-bottom:18px;}
  .cta-inner p{color:#c9cdd3; max-width:560px; margin:0 auto 36px; font-size:1.05rem;}
  .cta-buttons{display:flex; justify-content:center; gap:18px; flex-wrap:wrap;}

  /* ---------- footer ---------- */
  footer{padding:56px 0 28px;}
  .foot-grid{display:grid; grid-template-columns:1.3fr 1fr 1fr; gap:40px; margin-bottom:48px;}
  footer p{color:#c9cdd3; font-size:0.9rem; max-width:340px;}
  .foot-col h4{
    font-size:0.78rem; letter-spacing:0.14em; text-transform:uppercase; color:#c9cdd3;
    margin-bottom:16px; font-weight:700;
  }
  .foot-col a, .foot-col span{display:block; margin-bottom:10px; font-size:0.92rem; color:#f3f1ec; opacity:0.9;}
  .foot-col a:hover{color:#e3151a;}
  .foot-bottom{
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;
    padding-top:24px; border-top:1px solid rgba(255,255,255,0.08); font-size:0.8rem; color:#c9cdd3;
  }
  @media (max-width:760px){ .foot-grid{grid-template-columns:1fr;} }

  /* ---------- floating whatsapp ---------- */
  .float-wa{
    position:fixed; bottom:22px; right:22px; z-index:60;
    background:#e3151a; color:#fff; width:58px; height:58px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(227,21,26,0.45);
    transition:transform .2s;
  }
  .float-wa:hover{transform:scale(1.08);}
  .float-wa svg{width:28px;height:28px;}
</style>
