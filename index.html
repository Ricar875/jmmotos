<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JM Motos — Motos seminovas em Sergipe</title>
<meta name="description" content="JM Motos: motos seminovas revisadas, documentação em dia e garantia. Atendimento em todo o Submédio São Francisco e Sergipe.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0a0a;
    --carbon:#151515;
    --carbon-2:#1e1e1e;
    --red:#e3151a;
    --red-deep:#a30f13;
    --steel:#c9cdd3;
    --paper:#f3f1ec;
    --line-yellow:#f2c230;
    --border: rgba(255,255,255,0.08);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--paper);
    font-family:'Barlow', sans-serif;
    font-size:16px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Oswald', sans-serif;
    text-transform:uppercase;
    letter-spacing:0.01em;
    margin:0;
  }
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;}
  .wrap{max-width:1240px;margin:0 auto;padding:0 24px;}

  /* ---------- signature: parking-line motif ---------- */
  .lane{
    height:14px;
    background: repeating-linear-gradient(
      -45deg,
      var(--line-yellow) 0 26px,
      transparent 26px 52px
    );
    opacity:0.9;
  }
  .lane.thin{height:6px; opacity:0.55;}
  .lane-frame{border-top:1px solid var(--border); border-bottom:1px solid var(--border);}

  /* ---------- header ---------- */
  header{
    position:sticky; top:0; z-index:50;
    background:rgba(10,10,10,0.92);
    backdrop-filter: blur(8px);
    border-bottom:1px solid var(--border);
  }
  .nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px; max-width:1240px; margin:0 auto;
  }
  .logo{
    display:flex; align-items:center; gap:10px;
  }
  .logo img{height:44px; width:auto; display:block;}
  .navlinks{display:flex; gap:32px; font-size:0.85rem; letter-spacing:0.06em; text-transform:uppercase; font-weight:600;}
  .navlinks a{opacity:0.75; transition:opacity .2s;}
  .navlinks a:hover{opacity:1; color:var(--red);}
  .btn{
    display:inline-flex; align-items:center; gap:10px;
    background:var(--red); color:#fff; font-weight:700;
    padding:12px 22px; border-radius:2px; font-size:0.85rem;
    letter-spacing:0.05em; text-transform:uppercase;
    border:1px solid var(--red); transition:transform .15s, background .2s;
  }
  .btn:hover{background:var(--red-deep); transform:translateY(-1px);}
  .btn.ghost{background:transparent; color:var(--paper); border-color:var(--border);}
  .btn.ghost:hover{border-color:var(--red); color:var(--red);}
  .btn svg{width:18px;height:18px;flex-shrink:0;}
  @media (max-width:860px){ .navlinks{display:none;} }

  /* ---------- hero ---------- */
  .hero{
    position:relative; overflow:hidden;
    display:grid; grid-template-columns: 1.1fr 0.9fr; align-items:stretch;
    min-height:88vh;
    border-bottom:1px solid var(--border);
  }
  .hero-copy{
    display:flex; flex-direction:column; justify-content:center;
    padding:80px 56px; position:relative; z-index:2;
    background:
      linear-gradient(120deg, rgba(10,10,10,1) 55%, rgba(10,10,10,0.2) 100%);
  }
  .eyebrow{
    color:var(--red); font-weight:700; font-size:0.8rem; letter-spacing:0.25em;
    text-transform:uppercase; margin-bottom:20px; display:flex; align-items:center; gap:12px;
  }
  .eyebrow::before{content:''; width:34px; height:2px; background:var(--red);}
  .hero h1{
    font-size:clamp(2.6rem, 5.2vw, 4.6rem);
    line-height:0.98; color:var(--paper); font-weight:700;
  }
  .hero h1 em{font-style:normal; color:var(--red);}
  .hero p.lead{
    margin-top:26px; max-width:480px; font-size:1.1rem; color:var(--steel);
    font-family:'Barlow'; font-style:italic; font-weight:500;
  }
  .hero-cta{display:flex; gap:16px; margin-top:40px; flex-wrap:wrap;}
  .hero-badges{
    display:flex; gap:28px; margin-top:56px; padding-top:28px;
    border-top:1px solid var(--border); flex-wrap:wrap;
  }
  .hero-badges .badge{font-size:0.78rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--steel); font-weight:600; display:flex; align-items:center; gap:8px;}
  .hero-badges .badge svg{width:16px;height:16px; color:var(--red);}
